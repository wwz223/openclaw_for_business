name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支/PR 新 commit 进来时，自动取消正在运行的旧 CI
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  OPENCLAW_REPO: 'https://github.com/openclaw/openclaw'

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone openclaw upstream
        run: git clone ${{ env.OPENCLAW_REPO }} openclaw

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: openclaw/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install openclaw dependencies
        working-directory: openclaw
        run: pnpm install

      - name: Build openclaw
        working-directory: openclaw
        run: pnpm build

      - name: Setup config from template
        run: |
          mkdir -p ~/.openclaw
          cp config-templates/openclaw.json ~/.openclaw/openclaw.json

      # systemd user session 支持（Linux 需要 XDG_RUNTIME_DIR）
      - name: Enable systemd user session
        if: runner.os == 'Linux'
        run: |
          sudo loginctl enable-linger $USER || true
          XDG_DIR="/run/user/$(id -u)"
          sudo mkdir -p "$XDG_DIR"
          sudo chown $USER "$XDG_DIR"
          echo "XDG_RUNTIME_DIR=$XDG_DIR" >> $GITHUB_ENV

      - name: Run setup-crew.sh
        run: bash scripts/setup-crew.sh

      - name: Run apply-addons.sh
        run: bash scripts/apply-addons.sh
