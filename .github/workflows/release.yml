name: Release

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  OPENCLAW_REPO: 'https://github.com/openclaw/openclaw'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: 按 PR 标签自动递增版本号并提交
  #         测试已在 ci.yml 中通过，此处不再重复
  # ──────────────────────────────────────────────────────────────────────────
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          set -e
          current=$(cat version | tr -d 'v' | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$current"

          # 通过 PR 标签决定递增类型（默认 patch）
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            major=$((major + 1)); minor=0; patch=0
          elif echo "$LABELS" | grep -q '"minor"'; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          NEW_VERSION="v${major}.${minor}.${patch}"
          echo "$NEW_VERSION" > version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to: $NEW_VERSION"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: 构建打包并发布 Release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Clone openclaw upstream
        run: git clone ${{ env.OPENCLAW_REPO }} openclaw

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: openclaw/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install openclaw dependencies
        working-directory: openclaw
        run: pnpm install

      - name: Build openclaw
        working-directory: openclaw
        run: pnpm build

      - name: Create release archive
        id: archive
        timeout-minutes: 10
        run: |
          VERSION="${{ needs.bump-version.outputs.version }}"
          ARCHIVE="openclaw-for-business-${VERSION}.tar.gz"

          STAGE=$(mktemp -d)
          DEST="${STAGE}/openclaw_for_business"

          # cp -al：创建硬链接树（极快，几乎不占额外磁盘空间）
          cp -al . "$DEST"

          # 删除不需要打包的内容
          rm -rf "$DEST/.git" "$DEST/openclaw/.git"
          find "$DEST/addons" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

          # tar 原生识别硬链接，相同 inode 只存一份，archive 体积远小于 zip
          cd "$STAGE"
          tar czf "${GITHUB_WORKSPACE}/${ARCHIVE}" openclaw_for_business/

          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT
          ls -lh "${GITHUB_WORKSPACE}/${ARCHIVE}"
          echo "Archive created: ${ARCHIVE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.version }}
          name: "Release ${{ needs.bump-version.outputs.version }}"
          generate_release_notes: true
          files: "*.tar.gz"
